<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>86版《西游记》角色全清单 & 25集分集剧情</title>
<style>
:root {
  --red: #b71c1c; --red-light: #e53935;
  --gold: #c8960c;
  --bg: #fdf6ec; --card-bg: #fffef9;
  --text: #2c1810; --text-light: #6b5a4e; --border: #e8dcc8;
  --shadow: 0 2px 12px rgba(0,0,0,.06); --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
  --main-color: #e53935; --main-bg: #ffeaea;
  --support-color: #e67e22; --support-bg: #fff3e6;
  --minor-color: #5c6bc0; --minor-bg: #eef0fb;
  --extra-color: #999; --extra-bg: #f5f5f5;
  --item-color: #00897b; --item-bg: #e6f5f2;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }

/* Hero */
.hero { background:linear-gradient(135deg,#4a1111 0%,#8b1a1a 30%,#b71c1c 60%,#7f1414 100%); color:#fff; padding:48px 24px 40px; text-align:center; position:relative; overflow:hidden; }
.hero::before { content:""; position:absolute; top:-40px; right:-40px; width:200px; height:200px; border:2px solid rgba(255,255,255,.1); border-radius:50%; }
.hero::after { content:""; position:absolute; bottom:-60px; left:-30px; width:180px; height:180px; border:2px solid rgba(255,255,255,.08); border-radius:50%; }
.hero h1 { font-size:clamp(28px,5vw,48px); letter-spacing:4px; margin-bottom:8px; }
.hero .sub { font-size:15px; opacity:.75; }
.hero .cloud { position:absolute; top:50%; transform:translateY(-50%); opacity:.06; font-size:120px; pointer-events:none; user-select:none; }
.hero .cloud.left { left:5%; } .hero .cloud.right { right:5%; }

/* Stats */
.stats { display:flex; flex-wrap:wrap; gap:16px; max-width:1100px; margin:-28px auto 0; padding:0 24px; justify-content:center; position:relative; z-index:2; }
.stat-card { background:var(--card-bg); border-radius:12px; padding:20px 28px; box-shadow:var(--shadow-lg); min-width:140px; text-align:center; flex:1; max-width:200px; transition:transform .2s; }
.stat-card:hover { transform:translateY(-4px); }
.stat-card .num { font-size:36px; font-weight:800; line-height:1; }
.stat-card .label { font-size:13px; color:var(--text-light); margin-top:6px; }
.stat-card.team .num { color:var(--main-color); }
.stat-card.immortal .num { color:#1565c0; }
.stat-card.demon .num { color:#6a1b9a; }
.stat-card.mortal .num { color:#00838f; }
.stat-card.item .num { color:#2e7d32; }

.container { max-width:1300px; margin:0 auto; padding:24px; }

/* Toolbar */
.toolbar { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:24px; }
.search-box { flex:1; min-width:240px; position:relative; }
.search-box input { width:100%; padding:12px 16px 12px 44px; border:2px solid var(--border); border-radius:10px; font-size:15px; background:var(--card-bg); color:var(--text); transition:border-color .2s; outline:none; }
.search-box input:focus { border-color:var(--gold); }
.search-box .icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:18px; opacity:.4; }
.filter-group { display:flex; gap:8px; flex-wrap:wrap; }
.filter-btn { padding:8px 18px; border-radius:20px; border:1.5px solid var(--border); background:var(--card-bg); cursor:pointer; font-size:13px; color:var(--text-light); transition:all .2s; white-space:nowrap; }
.filter-btn:hover { border-color:var(--gold); color:var(--text); }
.filter-btn.active { background:var(--red); color:#fff; border-color:var(--red); }
.result-info { font-size:13px; color:var(--text-light); margin-bottom:4px; }
.result-info strong { color:var(--red); }

/* Tabs */
.tabs { display:flex; gap:4px; margin-bottom:24px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
.tab { padding:12px 24px; border-radius:10px 10px 0 0; cursor:pointer; font-size:15px; font-weight:600; white-space:nowrap; border:none; background:transparent; color:var(--text-light); transition:all .2s; position:relative; }
.tab:hover { color:var(--text); background:rgba(0,0,0,.03); }
.tab.active { color:var(--red); background:var(--card-bg); box-shadow:0 -2px 8px rgba(0,0,0,.04); }
.tab .count { font-size:12px; font-weight:400; opacity:.6; margin-left:4px; }

/* Cards */
.section-header { font-size:14px; font-weight:700; color:var(--text-light); margin:24px 0 12px; padding-bottom:8px; border-bottom:1px dashed var(--border); display:flex; align-items:center; gap:8px; letter-spacing:1px; }
.section-header .dot { width:8px; height:8px; border-radius:50%; background:var(--gold); }
.cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:14px; }
.card { background:var(--card-bg); border-radius:10px; padding:14px 16px; box-shadow:var(--shadow); border-left:4px solid transparent; transition:all .2s; cursor:pointer; display:flex; gap:14px; align-items:center; }
.card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
.card.main { border-left-color:var(--main-color); }
.card.support { border-left-color:var(--support-color); }
.card.minor { border-left-color:var(--minor-color); }
.card.extra { border-left-color:var(--extra-color); }
.card.item-card { border-left-color:var(--item-color); }

/* Avatar thumbnail */
.avatar { width:52px; height:52px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:800; color:#fff; overflow:hidden; background:linear-gradient(135deg, #667eea, #764ba2); background-size:cover; background-position:center; position:relative; }
.avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.avatar.team { background:linear-gradient(135deg, #e53935, #ff6f00); }
.avatar.immortal { background:linear-gradient(135deg, #3949ab, #1565c0); }
.avatar.demon { background:linear-gradient(135deg, #7b1fa2, #e040fb); }
.avatar.mortal { background:linear-gradient(135deg, #00695c, #00897b); }
.avatar.item { background:linear-gradient(135deg, #2e7d32, #66bb6a); }

.card .info { flex:1; min-width:0; }
.card .name { font-size:17px; font-weight:700; margin-bottom:3px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.card .name .tag { font-size:10px; padding:2px 7px; border-radius:10px; font-weight:500; white-space:nowrap; }
.tag-main { background:var(--main-bg); color:var(--main-color); }
.tag-support { background:var(--support-bg); color:var(--support-color); }
.tag-minor { background:var(--minor-bg); color:var(--minor-color); }
.tag-extra { background:var(--extra-bg); color:var(--extra-color); }
.tag-item { background:var(--item-bg); color:var(--item-color); }
.card .identity { font-size:12px; color:var(--text-light); line-height:1.4; }
.card .meta { font-size:11px; color:var(--text-light); margin-top:4px; display:flex; gap:10px; opacity:.7; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:1000; display:flex; align-items:center; justify-content:center; padding:24px; animation:fadeIn .2s; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes slideUp { from { transform:translateY(30px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.modal-content { background:var(--card-bg); border-radius:16px; max-width:480px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.3); animation:slideUp .25s; position:relative; }
.modal-close { position:absolute; top:12px; right:14px; width:36px; height:36px; border-radius:50%; border:none; background:rgba(0,0,0,.08); cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; color:var(--text-light); z-index:2; transition:all .2s; }
.modal-close:hover { background:rgba(0,0,0,.15); color:var(--text); }

.modal-hero { width:100%; aspect-ratio:1/1; max-height:60vh; display:flex; align-items:center; justify-content:center; font-size:72px; color:#fff; font-weight:900; position:relative; overflow:hidden; }
.modal-hero img { width:100%; height:100%; object-fit:contain; position:absolute; inset:0; background:rgba(0,0,0,.15); }
.modal-hero .avatar-text { position:relative; z-index:1; }
.modal-hero.team { background:linear-gradient(135deg, #e53935, #ff6f00); }
.modal-hero.immortal { background:linear-gradient(135deg, #3949ab, #1565c0); }
.modal-hero.demon { background:linear-gradient(135deg, #7b1fa2, #e040fb); }
.modal-hero.mortal { background:linear-gradient(135deg, #00695c, #00897b); }
.modal-hero.item { background:linear-gradient(135deg, #2e7d32, #66bb6a); }

.modal-body { padding:24px; }
.modal-body h2 { font-size:26px; margin-bottom:4px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.modal-body h2 .tag { font-size:12px; padding:3px 10px; border-radius:12px; font-weight:500; }
.modal-body .aka { font-size:15px; color:var(--text-light); margin-bottom:12px; }
.modal-body .detail-row { display:flex; gap:16px; margin-bottom:14px; flex-wrap:wrap; }
.modal-body .detail-item { background:var(--bg); border-radius:8px; padding:10px 14px; flex:1; min-width:100px; }
.modal-body .detail-item .dlabel { font-size:11px; color:var(--text-light); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
.modal-body .detail-item .dval { font-size:15px; font-weight:600; }

/* No result */
.no-result { text-align:center; padding:60px 20px; color:var(--text-light); }
.no-result .big { font-size:48px; margin-bottom:12px; }

.footer { text-align:center; padding:40px 24px; color:var(--text-light); font-size:13px; border-top:1px solid var(--border); margin-top:40px; }
.footer strong { color:var(--red-light); }

@media (max-width:768px) {
  .stats { margin-top:16px; }
  .stat-card { padding:14px 16px; min-width:100px; }
  .stat-card .num { font-size:28px; }
  .cards { grid-template-columns:1fr; }
  .hero { padding:32px 16px 28px; }
  .hero h1 { font-size:24px; }
  .modal-hero { height:180px; }
}
@media (max-width:480px) {
  .tabs { gap:0; } .tab { padding:10px 14px; font-size:13px; }
}

/* ===== Episode Styles ===== */
.ep-header-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
.ep-header-bar .sort-info { font-size:13px; color:var(--text-light); opacity:.8; }
.ep-cards { display:flex; flex-direction:column; gap:14px; }
.ep-card { background:var(--card-bg); border-radius:12px; box-shadow:var(--shadow); display:flex; gap:16px; padding:20px; transition:all .2s; cursor:pointer; position:relative; overflow:hidden; }
.ep-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
.ep-rank { flex-shrink:0; width:52px; height:52px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:900; color:#fff; }
.ep-rank.fire { background:linear-gradient(135deg,#f12711,#f5af19); }
.ep-rank.gold { background:linear-gradient(135deg,#e53935,#ff6f00); }
.ep-rank.silver { background:linear-gradient(135deg,#e67e22,#f39c12); }
.ep-rank.bronze { background:linear-gradient(135deg,#5c6bc0,#7e57c2); }
.ep-rank.normal { background:linear-gradient(135deg,#90a4ae,#78909c); }
.ep-info { flex:1; min-width:0; }
.ep-title-row { display:flex; align-items:center; gap:10px; margin-bottom:6px; flex-wrap:wrap; }
.ep-title-row .ep-num { font-size:11px; background:var(--bg); padding:2px 10px; border-radius:10px; color:var(--text-light); white-space:nowrap; }
.ep-title-row .ep-title { font-size:18px; font-weight:700; }
.ep-title-row .hot-badge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; white-space:nowrap; }
.hot-badge.super { background:#fff3e0; color:#e65100; }
.hot-badge.star { background:#fff8e1; color:#f57f17; }
.hot-badge.good { background:#e8f5e9; color:#2e7d32; }
.ep-summary { font-size:13px; color:var(--text-light); line-height:1.7; margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.ep-chars { display:flex; gap:5px; flex-wrap:wrap; }
.ep-char-tag { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--bg); color:var(--text-light); }
.ep-highlight { font-size:11px; color:var(--red); margin-top:6px; opacity:.85; }
.ep-highlight::before { content:"💡 "; }
/* Episode Modal */
.ep-modal-hero { width:100%; aspect-ratio:2/1; max-height:40vh; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.ep-modal-hero .ep-modal-rank { font-size:56px; font-weight:900; opacity:.25; position:absolute; right:20px; top:10px; line-height:1; }
.ep-modal-hero .ep-modal-num { font-size:14px; opacity:.85; margin-bottom:4px; }
.ep-modal-hero .ep-modal-title { font-size:32px; font-weight:800; letter-spacing:2px; }
.ep-modal-hero.fire { background:linear-gradient(135deg,#f12711,#f5af19); color:#fff; }
.ep-modal-hero.gold { background:linear-gradient(135deg,#b71c1c,#e53935); color:#fff; }
.ep-modal-hero.silver { background:linear-gradient(135deg,#e67e22,#d84315); color:#fff; }
.ep-modal-hero.bronze { background:linear-gradient(135deg,#3949ab,#5c6bc0); color:#fff; }
.ep-modal-hero.normal { background:linear-gradient(135deg,#546e7a,#78909c); color:#fff; }
.ep-modal-body { padding:24px; }
.ep-modal-body h2 { font-size:24px; margin-bottom:12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.ep-modal-summary { font-size:15px; line-height:1.9; color:var(--text); margin-bottom:20px; }
.ep-modal-quotes { background:var(--bg); border-radius:10px; padding:16px 20px; margin-bottom:20px; }
.ep-modal-quotes .qlabel { font-size:12px; color:var(--gold); font-weight:700; margin-bottom:8px; letter-spacing:1px; }
.ep-modal-quotes .quote { font-size:14px; color:var(--text); line-height:1.8; margin-bottom:6px; padding-left:12px; border-left:3px solid var(--gold); }
.ep-modal-quotes .quote:last-child { margin-bottom:0; }
.ep-modal-chars .clabel { font-size:12px; color:var(--text-light); font-weight:700; margin-bottom:8px; letter-spacing:1px; }
.ep-modal-chars .ctags { display:flex; gap:8px; flex-wrap:wrap; }
.ep-modal-chars .ctag { padding:4px 12px; border-radius:12px; font-size:13px; background:var(--card-bg); border:1px solid var(--border); color:var(--text); }
@media (max-width:768px) {
  .ep-card { flex-direction:column; gap:10px; padding:16px; }
  .ep-modal-hero { aspect-ratio:3/2; }
  .ep-modal-hero .ep-modal-title { font-size:24px; }
}
</style>
</head>

// ===== 25集分集剧情（按观众喜爱度排名）=====
const episodes = [
  {rank:1,ep:16,title:"趣经女儿国",summary:"师徒来到西梁女国——举国皆女子的神秘国度。女王对唐僧一见倾心，愿以江山为聘、万金之躯相许。唐僧面临取经路上最特殊的考验：不是妖怪，而是一份炽热真挚的感情。蝎子精趁乱将唐僧掳入琵琶洞，悟空八戒不敌其倒马毒桩，请来昴日星官方才降服。唐僧辞别含泪的女王，策马西去——这是全剧唯一一次唐僧动了真情，也是86版公认艺术成就最高的一集。",quotes:["\"你说四大皆空，却紧闭双眼。要是你睁开眼睛看看我，我不信你两眼空空。\"","\"来世若有缘分……\" \"我只想今生，不想来世。\"","\"悄悄问圣僧，女儿美不美？\""],chars:["唐僧","孙悟空","猪八戒","沙僧","女儿国国王","蝎子精","昴日星官"],highlight:"唐僧唯一动真情 · 86版公认最佳单集 · 杨洁导演最爱"},
  {rank:2,ep:10,title:"三打白骨精",summary:"白虎岭白骨精为吃唐僧肉长生不老，先后变作村姑、老妇和老翁迷惑师徒。孙悟空火眼金睛识破妖术，三挥金箍棒打杀\"凡人\"。唐僧肉眼凡胎，认定悟空滥杀无辜，念紧箍咒痛责，最终写下贬书将其逐回花果山。悟空含泪叩别师父，一步三回头——这是全剧最令人心碎的一集，无数观众的童年\"泪点\"。",quotes:["\"师父——！师父——！\"","\"你走吧，我不要你这个徒弟了！\"","\"俺老孙去也！\""],chars:["唐僧","孙悟空","猪八戒","沙僧","白骨精"],highlight:"全剧最大泪点 · 悟空被逐名场面 · 一代人的童年阴影"},
  {rank:3,ep:3,title:"大圣闹天宫",summary:"悟空先封弼马温，得知是末等小官大怒反下天庭，自封齐天大圣。玉帝派托塔李天王、哪吒率天兵围剿花果山，被一一击败。二郎神率梅山六兄弟来战，双方七十二变斗法不分胜负，太上老君掷金刚琢偷袭，悟空被擒。斩妖台刀砍斧劈伤不得他半分，老君投入八卦炉炼了七七四十九天，反炼出火眼金睛！悟空蹬翻八卦炉，一路打上凌霄宝殿。",quotes:["\"皇帝轮流做，明年到我家！\"","\"吃俺老孙一棒！\"","\"俺老孙来也！\""],chars:["孙悟空","玉皇大帝","太上老君","哪吒","二郎神","巨灵神","四大天王","太白金星"],highlight:"全剧动作巅峰 · 八卦炉炼出火眼金睛 · 大闹天宫名场面"},
  {rank:4,ep:1,title:"猴王初问世",summary:"东胜神洲傲来国花果山顶一块仙石迸裂，产一石猴。石猴勇探水帘洞，被群猴拥为美猴王。为求长生不老，漂洋过海寻仙访道，终在灵台方寸山斜月三星洞拜菩提祖师为师，得名\"孙悟空\"，学成七十二变与筋斗云。回山后闯东海龙宫夺如意金箍棒，大闹幽冥地府勾销猴类生死簿。天庭震动，龙王与阎王联名上表——一场天地大戏就此拉开。",quotes:["\"我无性。人若骂我，我也不恼；若打我，我也不嗔。\"","\"求仙问卜，不如自己做主。\""],chars:["孙悟空","菩提祖师","东海龙王","十殿阎王","混世魔王","独角鬼王"],highlight:"石猴出世 · 拜师学艺 · 龙宫夺宝 · 传奇开篇"},
  {rank:5,ep:17,title:"三调芭蕉扇",summary:"八百里火焰山挡住西行路，唯铁扇公主的芭蕉扇能灭此火。一借：悟空被一扇扇飞五万余里；灵吉菩萨赠定风丹。二借：变作小虫钻入铁扇公主腹中逼出扇子，却是把假扇，火越扇越大。三借：变作牛魔王骗得真扇，不料真牛魔王变作猪八戒骗回。最终请天兵天将围剿，哪吒降服牛魔王，铁扇公主交出宝扇，连扇四十九扇，火焰山大火熄灭。",quotes:["\"嫂嫂，借扇子一用！\"","\"牛大哥，你我也算老相识了。\""],chars:["孙悟空","猪八戒","牛魔王","铁扇公主","玉面狐狸","哪吒","托塔李天王","灵吉菩萨"],highlight:"牛魔王大战群仙 · 三借三骗斗智斗勇 · 场面宏大"},
  {rank:6,ep:14,title:"大战红孩儿",summary:"号山枯松涧火云洞圣婴大王红孩儿——牛魔王与铁扇公主之子——用三昧真火挡住取经路。他变作吊在树上的孩童诱骗唐僧，一阵狂风卷走。悟空上门讨人，被三昧真火烧得焦头烂额，险些丧命。八戒去请观音，反被红孩儿变成假观音骗入洞中。悟空最终请来观音菩萨，用天罡刀阵与金箍收服红孩儿，令其做了善财童子。",quotes:["\"你是猴子请来的救兵吗？\"","\"你孙外公在此！\""],chars:["孙悟空","猪八戒","唐僧","红孩儿","观音菩萨"],highlight:"你是猴子请来的救兵吗 · 三昧真火名场面 · 年度最萌反派"},
  {rank:7,ep:15,title:"斗法降三怪",summary:"车迟国虎力、鹿力、羊力三位国师——实为妖道——蛊惑国王灭佛崇道，奴役全国僧人。悟空夜闹三清观大戏妖道，次日与三位国师展开惊天赌斗：祈雨、云梯显圣、隔板猜枚、砍头再生、剖腹挖心、滚油锅。六场斗法层层升级精彩绝伦，三位妖道一一现出原形毙命，车迟国重归正途。全剧最欢乐的一集。",quotes:["\"贫僧从东土大唐而来，前往西天拜佛求经。\"","\"你那个是小乘教法，度不得亡者超升。\""],chars:["孙悟空","猪八戒","沙僧","虎力大仙","鹿力大仙","羊力大仙","车迟国国王"],highlight:"六场赌斗层层升级 · 全剧最欢乐 · 夜闹三清观名场面"},
  {rank:8,ep:12,title:"夺宝莲花洞",summary:"平顶山莲花洞金角大王和银角大王——太上老君两个看炉童子下凡——手持紫金红葫芦、羊脂玉净瓶、七星剑、芭蕉扇、幌金绳五件法宝，法力高强。银角大王变作跌断腿的道人骗唐僧，用移山倒海之法压住悟空。悟空巧妙周旋偷换葫芦、骗装银角、收服金角，太上老君出面接回童子。五件法宝轮番登场，计谋百出。",quotes:["\"行者孙！\" \"你外公在此！\"","\"我叫你一声，你敢答应吗？\""],chars:["孙悟空","猪八戒","金角大王","银角大王","九尾狐","精细鬼","伶俐虫","太上老君"],highlight:"我叫你一声你敢答应吗 · 智斗经典 · 一集五法宝"},
  {rank:9,ep:7,title:"计收猪八戒",summary:"师徒来到高老庄，高太公哭诉女婿是妖怪霸占了女儿高翠兰。悟空变作翠兰模样在绣楼等候，妖怪回来现了原形——正是天蓬元帅投错猪胎的猪刚鬣。一番打斗后，得知他受观音点化在此等候取经人。唐僧收其为二徒弟，赐名\"猪悟能\"，别名\"八戒\"。那个好吃懒做、贪财好色又憨厚可爱的二师兄正式加入取经队伍。",quotes:["\"丈人啊，你招了俺老猪，保你一家吃穿不愁！\"","\"师父，俺老猪跟定你了！\""],chars:["唐僧","孙悟空","猪八戒","高太公","高翠兰"],highlight:"猪八戒正式入队 · 二师兄名场面 · 经典高老庄"},
  {rank:10,ep:9,title:"偷吃人参果",summary:"万寿山五庄观镇元大仙有灵根人参果树，三千年一开花三千年一结果三千年方成熟，闻一闻活三百六十岁，吃一个活四万七千年。悟空八戒偷吃人参果被道童辱骂，一怒推倒果树。镇元大仙赶回将师徒捉回。悟空遍访仙山求医树之方，最终观音菩萨用杨柳枝蘸玉净瓶甘露救活果树，镇元大仙与悟空结为兄弟。",quotes:["\"你这猴子，忒也无礼！\"","\"俺老孙做事俺老孙当！\""],chars:["孙悟空","猪八戒","唐僧","镇元大仙","观音菩萨","福禄寿三星"],highlight:"人参果树名场面 · 观音医树 · 与地仙之祖结拜"},
  {rank:11,ep:21,title:"错坠盘丝洞",summary:"盘丝洞中七个蜘蛛精姐妹在濯垢泉沐浴，唐僧误入被捉。悟空变作老鹰叼走衣服，八戒变作鲇鱼在池中乱窜——场面既香艳又滑稽。蜘蛛精请来师兄蜈蚣精（百眼魔君/多目怪）助阵，多目怪肋下千只眼迸射金光，悟空不敌。黎山老母化作妇人指点，请来毗蓝婆菩萨用绣花针破了金光，收服多目怪。",quotes:["\"好你个弼马温！\"","\"妖精，你孙外公来了！\""],chars:["孙悟空","猪八戒","唐僧","蜘蛛精七姐妹","蜈蚣精","黎山老母","毗蓝婆菩萨"],highlight:"七蜘蛛濯垢泉沐浴 · 经典香艳场面 · 八戒变鲇鱼"},

const categories = [
  {id:"all", label:"全部角色"},
  {id:"team", label:"取经团队"},
  {id:"immortal", label:"神仙体系"},
  {id:"demon", label:"妖怪精怪"},
  {id:"mortal", label:"凡人体系"},
  {id:"item", label:"法宝/其他"},
  {id:"episodes", label:"分集剧情"},
];
const impLabels = {main:"主角", support:"重要配角", minor:"次要角色", extra:"龙套"};
const impClasses = {main:"main", support:"support", minor:"minor", extra:"extra"};
const impTags = {main:"tag-main", support:"tag-support", minor:"tag-minor", extra:"tag-extra"};
const catColors = {
  team:{icon:"🏆"}, immortal:{icon:"☁️"}, demon:{icon:"👹"}, mortal:{icon:"👤"}, item:{icon:"💎"},
};

let activeCat = "all", activeImp = "all";

function getFirstChar(name) {
  const c = name.charAt(0);
  // Extract meaningful char from multi-char entries
  if (c === "真" || c === "精" || c === "蜜" || c === "崩" || c === "萧" || c === "房" || c === "陈" || c === "寇" || c === "一" || c === "广" || c === "监" || c === "龙" || c === "化" || c === "洪" || c === "刘" || c === "相" || c === "徐" || c === "法" || c === "斜") return name.slice(0,1);
  return c;
}

// ===== INIT =====
function init() {
  const counts = {team:0, immortal:0, demon:0, mortal:0, item:0};
  let total = 0;
  characters.forEach(c => { counts[c.cat]++; total++; });
  document.getElementById("stats").innerHTML = `
    <div class="stat-card team"><div class="num">${counts.team}</div><div class="label">🏆 取经团队</div></div>
    <div class="stat-card immortal"><div class="num">${counts.immortal}</div><div class="label">☁️ 神仙体系</div></div>
    <div class="stat-card demon"><div class="num">${counts.demon}</div><div class="label">👹 妖怪精怪</div></div>
    <div class="stat-card mortal"><div class="num">${counts.mortal}</div><div class="label">👤 凡人体系</div></div>
    <div class="stat-card item"><div class="num">${counts.item}</div><div class="label">💎 法宝/其他</div></div>
    <div class="stat-card" style="background:linear-gradient(135deg,#fff9e6,#fff3cd);"><div class="num" style="color:#e65100;">25</div><div class="label">📺 分集剧情</div></div>`;
  document.getElementById("totalCount").textContent = total;
  document.getElementById("tabs").innerHTML = categories.map(c => {
    const cnt = c.id === "all" ? total : (c.id === "episodes" ? 25 : (counts[c.id] || 0));
    return `<button class="tab${c.id===activeCat?' active':''}" data-cat="${c.id}">${c.label}<span class="count">(${cnt})</span></button>`;
  }).join("");

  document.querySelectorAll("#importanceFilter .filter-btn").forEach(btn => {
    btn.addEventListener("click", function() {
      document.querySelectorAll("#importanceFilter .filter-btn").forEach(b => b.classList.remove("active"));
      this.classList.add("active"); activeImp = this.dataset.filter; renderAll();
    });
  });
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", function() {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      this.classList.add("active"); activeCat = this.dataset.cat;
      // Toggle importance filter visibility
      const filterGroup = document.getElementById("importanceFilter");
      const searchInput = document.getElementById("search");
      if (activeCat === "episodes") {
        filterGroup.style.display = "none";
        searchInput.placeholder = "搜索剧情标题或集数...";
      } else {
        filterGroup.style.display = "";
        searchInput.placeholder = "搜索角色名称或身份...";
      }
      renderAll();
    });
  });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModalDirect(); });
  renderAll();
}

// ===== MODAL =====
function openModal(c) {
  const hero = document.getElementById("modalHero");
  const body = document.getElementById("modalBody");
  hero.className = "modal-hero " + c.cat;
  if (c.img) {
    hero.innerHTML = `<img src="${c.img}" alt="${c.name}" style="width:100%;height:100%;object-fit:cover;">`;
  } else {
    hero.innerHTML = `<span class="avatar-text">${getFirstChar(c.name)}</span>`;
  }
  body.innerHTML = `
    <h2>${c.name} <span class="tag ${impTags[c.imp]}">${impLabels[c.imp]}</span></h2>
    ${c.aka ? `<div class="aka">${c.aka}</div>` : ""}
    <div class="detail-row">
      <div class="detail-item"><div class="dlabel">身份</div><div class="dval">${c.identity}</div></div>
      ${c.ep ? `<div class="detail-item"><div class="dlabel">出场</div><div class="dval">📺 ${c.ep}</div></div>` : ""}
    </div>
    <div class="detail-row">
      <div class="detail-item"><div class="dlabel">体系</div><div class="dval">${({team:"取经团队",immortal:"神仙体系",demon:"妖怪精怪",mortal:"凡人体系",item:"法宝/其他"})[c.cat]}</div></div>
      ${c.sub ? `<div class="detail-item"><div class="dlabel">子类</div><div class="dval">${c.sub}</div></div>` : ""}
    </div>
  `;
  document.getElementById("modal").style.display = "flex";
  document.body.style.overflow = "hidden";
}
function closeModal(e) { if (e.target === document.getElementById("modal")) closeModalDirect(); }
function closeModalDirect() {
  document.getElementById("modal").style.display = "none";
  document.body.style.overflow = "";
}

// ===== RENDER =====
function getRankClass(rank) {
  if (rank <= 3) return "fire";
  if (rank <= 8) return "gold";
  if (rank <= 15) return "silver";
  if (rank <= 22) return "bronze";
  return "normal";
}
function getHotLabel(rank) {
  if (rank <= 3) return '<span class="hot-badge super">🔥 必看神作</span>';
  if (rank <= 8) return '<span class="hot-badge star">⭐ 经典必看</span>';
  if (rank <= 18) return '<span class="hot-badge good">👍 精彩好剧</span>';
  return '';
}

function renderAll() {
  const query = document.getElementById("search").value.trim().toLowerCase();

  // Episode mode
  if (activeCat === "episodes") {
    let filtered = episodes;
    if (query) {
      filtered = episodes.filter(e =>
        e.title.toLowerCase().includes(query) ||
        e.summary.toLowerCase().includes(query) ||
        String(e.ep).includes(query) ||
        (e.chars && e.chars.some(ch => ch.toLowerCase().includes(query))) ||
        (e.highlight && e.highlight.toLowerCase().includes(query))
      );
    }
    document.getElementById("resultInfo").innerHTML = `找到 <strong>${filtered.length}</strong> 集剧情`;

    let html = '<div class="ep-header-bar"><div class="sort-info">按观众喜爱度排行 ↓</div></div><div class="ep-cards">';
    filtered.forEach(e => {
      html += `
      <div class="ep-card" onclick="openEpModal(episodes[${episodes.indexOf(e)}])">
        <div class="ep-rank ${getRankClass(e.rank)}">${e.rank}</div>
        <div class="ep-info">
          <div class="ep-title-row">
            <span class="ep-num">第${e.ep}集</span>
            <span class="ep-title">${e.title}</span>
            ${getHotLabel(e.rank)}
          </div>
          <div class="ep-summary">${e.summary}</div>
          <div class="ep-chars">${(e.chars||[]).map(c=>`<span class="ep-char-tag">${c}</span>`).join("")}</div>
          <div class="ep-highlight">${e.highlight}</div>
        </div>
      </div>`;
    });
    html += '</div>';
    if (filtered.length === 0) {
      html = '<div class="no-result"><div class="big">📺</div><p>没有匹配的剧情，试试换个关键词？</p></div>';
    }
    document.getElementById("tabContents").innerHTML = html;
    return;
  }

  // Character mode
  let filtered = characters;
  if (activeCat !== "all") filtered = filtered.filter(c => c.cat === activeCat);
  if (activeImp !== "all") filtered = filtered.filter(c => c.imp === activeImp);
  if (query) {
    filtered = filtered.filter(c =>
      c.name.toLowerCase().includes(query) || (c.aka && c.aka.toLowerCase().includes(query)) ||
      c.identity.toLowerCase().includes(query) || (c.sub && c.sub.toLowerCase().includes(query)));
  }
  document.getElementById("resultInfo").innerHTML = `找到 <strong>${filtered.length}</strong> 个角色`;

  const catOrder = activeCat === "all" ? categories.filter(c => c.id !== "all" && c.id !== "episodes") : categories.filter(c => c.id === activeCat);
  let html = "";
  catOrder.forEach(cat => {
    const catChars = filtered.filter(c => c.cat === cat.id);
    if (catChars.length === 0) return;
    const subs = {};
    catChars.forEach(c => { const key = c.sub || "其他"; if (!subs[key]) subs[key] = []; subs[key].push(c); });
    html += `<div class="tab-content active"><div class="section-header"><div class="dot"></div>${catColors[cat.id].icon} ${cat.label}（${catChars.length}）</div>`;

    Object.entries(subs).forEach(([subName, chars]) => {
      if (Object.keys(subs).length > 1 && cat.id !== "team") {
        html += `<div style="font-size:13px;color:var(--text-light);margin:8px 0 4px 4px;opacity:.7;">▸ ${subName}</div>`;
      }
      html += `<div class="cards">`;
      chars.forEach((c, idx) => {
        const impClass = impClasses[c.imp] || "minor";
        const tagClass = impTags[c.imp] || "tag-minor";
        const akaHtml = c.aka ? ` <span style="font-size:13px;color:var(--text-light);font-weight:400;">(${c.aka})</span>` : "";
        const eptext = c.ep ? `<span>📺 ${c.ep}</span>` : "";
        const imgHtml = c.img
          ? `<img src="${c.img}" alt="${c.name}" loading="lazy">`
          : getFirstChar(c.name);
        html += `
        <div class="card ${impClass}" onclick="openModal(characters[${characters.indexOf(c)}])">
          <div class="avatar ${c.cat}">${imgHtml}</div>
          <div class="info">
            <div class="name">${c.name}${akaHtml}<span class="tag ${tagClass}">${impLabels[c.imp]}</span></div>
            <div class="identity">${c.identity}</div>
            ${eptext ? `<div class="meta">${eptext}</div>` : ""}
          </div>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  });
  if (filtered.length === 0) {
    html = `<div class="no-result"><div class="big">🔍</div><p>没有找到匹配的角色，试试换个关键词？</p></div>`;
  }
  document.getElementById("tabContents").innerHTML = html;
}

// ===== EPISODE MODAL =====
function openEpModal(e) {
  const hero = document.getElementById("modalHero");
  const body = document.getElementById("modalBody");
  const rc = getRankClass(e.rank);
  hero.className = "modal-hero ep-modal-hero " + rc;
  hero.innerHTML = `
    <div class="ep-modal-rank">#${e.rank}</div>
    <div class="ep-modal-num">第 ${e.ep} 集</div>
    <div class="ep-modal-title">${e.title}</div>`;

  let quotesHtml = "";
  if (e.quotes && e.quotes.length > 0) {
    quotesHtml = `<div class="ep-modal-quotes"><div class="qlabel">🎬 经典台词</div>${e.quotes.map(q => `<div class="quote">${q}</div>`).join("")}</div>`;
  }

  body.innerHTML = `
    <h2>第${e.ep}集 ${e.title} <span class="tag" style="background:#fff3e0;color:#e65100;border:1px solid #ffcc80;">观众喜爱度 #${e.rank}</span></h2>
    ${e.highlight ? `<div style="font-size:14px;color:var(--red);margin-bottom:12px;opacity:.9;">💡 ${e.highlight}</div>` : ""}
    <div class="ep-modal-summary">${e.summary}</div>
    ${quotesHtml}
    <div class="ep-modal-chars"><div class="clabel">🎭 本集关键角色</div><div class="ctags">${(e.chars||[]).map(c => `<span class="ctag">${c}</span>`).join("")}</div></div>
    <div style="margin-top:16px;font-size:13px;color:var(--text-light);">全剧共25集 · 按观众喜爱度排序</div>
  `;

  document.getElementById("modal").style.display = "flex";
  document.body.style.overflow = "hidden";
}

init();
</script>
</body>
</html>
